name: AutoBook CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: wmhmw
          MYSQL_DATABASE: autobook
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pwmhmw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        env:
          DATABASE_URL: mysql://root:wmhmw@127.0.0.1:3306/autobook
        run: npx prisma migrate deploy

      - name: Reset Database & Apply Migrations
        env:
          DATABASE_URL: mysql://root:wmhmw@127.0.0.1:3306/autobook
        run: npx prisma migrate reset --force

      - name: Build Docker Image
        run: docker build -t hiroosha/autobook-backend:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/autobook-backend:latest